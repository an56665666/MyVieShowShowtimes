<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f0e8" />
    <title>威秀場次查詢</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="top">
      <div class="top-inner">
        <h1>威秀場次查詢</h1>
      </div>
    </header>

    <main class="wrap">
      <section class="panel controls">
        <label class="field">
          <span class="label">影城</span>
          <select id="cinema" aria-label="Cinema">
            <option value="">載入中…</option>
          </select>
        </label>
        <label class="field">
          <span class="label">日期</span>
          <select id="dateFilter" aria-label="Filter by date">
            <option value="">所有日期</option>
          </select>
        </label>
        <label class="field grow">
          <span class="label">電影</span>
          <select id="movieFilter" aria-label="Filter by movie">
            <option value="">所有電影</option>
          </select>
        </label>
        <button type="button" id="refresh" class="btn primary">重新整理</button>
      </section>

      <div id="loader" class="loader" hidden>
        <div class="spinner" aria-label="Loading"></div>
        <span class="loader-text">載入場次中…</span>
      </div>

      <p id="status" class="status" role="status"></p>

      <section id="results" class="results" aria-live="polite"></section>
    </main>

    <footer class="foot">
    </footer>

    <script src="/app.js" type="module"></script>
  </body>
</html>
